<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Sign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background: #f5f6fa;
            min-height: 100vh;
        }

        /* Pink soft accents */
        :root {
            --pink-soft: #f8b4c8;
            --pink-light: #fde8ef;
            --pink-mid: #f472b6;
            --gray-900: #1a1a2e;
            --gray-700: #374151;
            --gray-400: #9ca3af;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        .card-header-pink {
            background: linear-gradient(135deg, #fff0f6 0%, #fce7f3 100%);
            border-bottom: 1px solid #fbcfe8;
            border-radius: 16px 16px 0 0 !important;
            padding: 1.5rem 2rem;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #f9a8d4, #ec4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.3px;
        }

        .brand-text span {
            color: #ec4899;
        }

        .form-control {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #f9a8d4;
            box-shadow: 0 0 0 3px rgba(249,168,212,0.25);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-pink:hover {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(236,72,153,0.3);
        }

        .btn-outline-pink {
            border: 1.5px solid #f9a8d4;
            color: #ec4899;
            background: transparent;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-outline-pink:hover {
            background: #fce7f3;
            color: #db2777;
        }

        .btn-dark-main {
            background: var(--gray-900);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-dark-main:hover {
            background: #16213e;
            color: white;
            transform: translateY(-1px);
        }

        .divider-text {
            color: var(--gray-400);
            font-size: 0.85rem;
            position: relative;
            text-align: center;
        }

        .divider-text::before, .divider-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider-text::before { left: 0; }
        .divider-text::after { right: 0; }

        .link-pink {
            color: #ec4899;
            text-decoration: none;
            font-weight: 500;
        }

        .link-pink:hover {
            color: #db2777;
            text-decoration: underline;
        }

        .badge-pink {
            background: #fce7f3;
            color: #db2777;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .navbar-top {
            background: white;
            border-bottom: 1px solid #f3f4f6;
            padding: 0.85rem 1.5rem;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper .bi {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 1rem;
        }

        .input-icon-wrapper .form-control {
            padding-left: 2.4rem;
        }

        .alert-soft {
            background: #fce7f3;
            border: 1px solid #fbcfe8;
            color: #9d174d;
            border-radius: 10px;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
