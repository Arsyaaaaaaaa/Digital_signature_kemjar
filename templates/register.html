<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Digital Sign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(150deg, #fff0f6 0%, #f5f6fa 50%, #eff6ff 100%); min-height: 100vh; }

        .card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }

        .form-control {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.65rem 1rem 0.65rem 2.4rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #f9a8d4;
            box-shadow: 0 0 0 3px rgba(249,168,212,0.25);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white; border: none;
            border-radius: 10px; padding: 0.65rem 1.5rem;
            font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s; width: 100%;
        }
        .btn-pink:hover {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white; transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(236,72,153,0.3);
        }

        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper .bi {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: #9ca3af; font-size: 1rem;
        }

        .link-pink { color: #ec4899; text-decoration: none; font-weight: 500; }
        .link-pink:hover { color: #db2777; text-decoration: underline; }

        .brand-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #f9a8d4, #ec4899);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem;
        }

        .step-badge {
            background: #fce7f3; color: #db2777;
            border-radius: 6px; padding: 3px 8px;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px;
        }

        .divider-text {
            color: #9ca3af; font-size: 0.85rem;
            position: relative; text-align: center;
        }
        .divider-text::before, .divider-text::after {
            content: ''; position: absolute; top: 50%;
            width: 38%; height: 1px; background: #e5e7eb;
        }
        .divider-text::before { left: 0; }
        .divider-text::after { right: 0; }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div style="width: 100%; max-width: 420px; padding: 1rem;">

        <!-- Brand -->
        <div class="text-center mb-4">
            <div class="d-flex justify-content-center mb-2">
                <div class="brand-icon"><i class="bi bi-pen"></i></div>
            </div>
            <h5 class="fw-700 mb-1" style="font-weight:700;color:#1a1a2e;">Digital<span style="color:#ec4899;">Sign</span></h5>
            <p class="text-muted" style="font-size:0.85rem;">Platform Tanda Tangan Digital Aman</p>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <div class="d-flex align-items-center justify-content-between mb-1">
                    <h5 class="fw-600 mb-0" style="font-weight:600;color:#1a1a2e;">Buat Akun</h5>
                    <span class="step-badge">LANGKAH 1/3</span>
                </div>
                <p class="text-muted mb-4" style="font-size:0.85rem;">Isi data diri Anda untuk mendaftar</p>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.85rem;font-weight:500;color:#374151;">Nama Lengkap</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-person"></i>
                            <input type="text" name="name" class="form-control" placeholder="Nama lengkap Anda" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.85rem;font-weight:500;color:#374151;">Email</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-envelope"></i>
                            <input type="email" name="email" class="form-control" placeholder="email@contoh.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" style="font-size:0.85rem;font-weight:500;color:#374151;">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock"></i>
                            <input type="password" name="password" class="form-control" placeholder="Minimal 8 karakter" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-pink py-2">
                        <i class="bi bi-person-plus me-2"></i>Daftar Sekarang
                    </button>

                </form>

                <div class="divider-text my-3">atau</div>

                <div class="text-center" style="font-size:0.875rem;color:#6b7280;">
                    Sudah punya akun? <a href="/login" class="link-pink">Masuk di sini</a>
                </div>
            </div>
        </div>

        <p class="text-center mt-4" style="font-size:0.75rem;color:#9ca3af;">
            &copy; 2025 DigitalSign &mdash; Keamanan Jaringan
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
